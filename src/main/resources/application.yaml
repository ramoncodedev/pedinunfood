spring:
  application:
    name: saas-pedidos

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate # Use 'update' para desenvolvimento, 'validate' para produção
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# Placeholder para o Spring Security / JWT
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000 # 24h
